<!DOCTYPE html>
<html lang="id" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Pasien - Sistem Pemeriksaan Kesehatan Pranikah</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <script src="/_sdk/element_sdk.js"></script>
    <link rel="stylesheet" href="css/login_pasien.css" />
    <style>
      body {
        box-sizing: border-box;
      }
    </style>
    <script
      src="https://cdn.tailwindcss.com/3.4.17"
      type="text/javascript"
    ></script>
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  </head>
  <body>
    <div class="decorative-shape shape-1"></div>
    <div class="decorative-shape shape-2"></div>
    <div class="decorative-shape shape-3"></div>
    <div class="main-wrapper">
      <!-- Content -->
      <div class="content-wrapper">
        <div class="login-container">
          <!-- Success Message -->
          <div class="success-message" id="successMessage">
            <p class="success-message-text" id="successText">
              ✓ Login berhasil! Mengalihkan ke dashboard...
            </p>
          </div>
          <!-- Login Card -->
          <div class="login-card">
            <!-- Header -->
            <div class="login-header">
              <div class="user-icon">
                <svg
                  viewbox="0 0 48 48"
                  fill="none"
                  xmlns="http://www.w3.org/2000/svg"
                >
                  <circle cx="24" cy="16" r="8" fill="#FFFFFF" opacity="0.9" />
                  <path
                    d="M12 40C12 32.268 17.268 26 24 26C30.732 26 36 32.268 36 40"
                    stroke="#FFFFFF"
                    stroke-width="3"
                    stroke-linecap="round"
                    opacity="0.9"
                  />
                  <circle
                    cx="24"
                    cy="24"
                    r="20"
                    fill="none"
                    stroke="#FFFFFF"
                    stroke-width="1"
                    opacity="0.3"
                  />
                </svg>
              </div>
              <h1 class="login-title" id="pageTitle">Login Pasien</h1>
              <p class="login-subtitle" id="pageSubtitle">
                Masukkan data diri Anda untuk melanjutkan
              </p>
            </div>
            <!-- Form -->
            <div id="messageAlert" class="message"></div>
            <form id="loginForm" onsubmit="handleLogin(event)">
              <div class="form-group">
                <label for="fullname" class="form-label" id="fullnameLabel"
                  >Nama Lengkap</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="fullname"
                  name="fullname"
                  placeholder="Cth: Budi Santoso"
                  required
                />
                <div class="invalid-feedback">Nama lengkap harus diisi</div>
              </div>
              <!-- Nomor Identitas -->
              <div class="form-group">
                <label for="identity" class="form-label" id="identityLabel"
                  >NIK</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="identity"
                  name="identity"
                  placeholder="Cth: 3201234567890123"
                  required
                />
                <div class="invalid-feedback">Nomor NIK harus diisi</div>
              </div>
              <!-- Password -->
              <div class="form-group">
                <label for="password" class="form-label" id="passwordLabel"
                  >Password</label
                >
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  name="password"
                  placeholder="Masukkan password Anda"
                  required
                />
                <div class="invalid-feedback">Password harus diisi</div>
              </div>
              <!-- Login Link -->
              <button type="submit" id="loginButton" class="btn btn-login">
                <span id="loginButtonText">Masuk</span>
              </button>
            </form>
            <!-- Back Link -->
            <div class="back-link-wrapper">
              <a href="index.html" class="back-link">
                <svg
                  class="back-arrow"
                  viewbox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M19 12H5M12 19l-7-7 7-7" /></svg
                ><span id="backLinkText">Kembali ke Halaman Utama</span>
              </a>
            </div>
          </div>
        </div>
      </div>
      <!-- Footer -->
      <footer>
        <p class="footer-text" id="footerText">
          © 2024 Sistem Pemeriksaan Kesehatan Pranikah. Hak Cipta Dilindungi.
        </p>
      </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const existingSession = JSON.parse(localStorage.getItem('pasienSession'));

if (existingSession && existingSession.role === 'pasien') {
  window.location.href = 'dashboard_pasien.html';
}
      const API_URL =
        'https://script.google.com/macros/s/AKfycbyS6y63OBsRpR81JhII3N_GxkkTIpgCcs_sCDHXjnx5onzwNOSyIKNbYFooXnLGkCHB/exec';

      function handleLogin(event) {
        event.preventDefault();

        const fullname = document.getElementById('fullname').value.trim();
        const nik = document.getElementById('identity').value.trim();
        const password = document.getElementById('password').value.trim();
        const messageAlert = document.getElementById('messageAlert');
        const loginButton = document.getElementById('loginButton');

        loginButton.disabled = true;
        messageAlert.className = 'message';

        fetch(API_URL, {
          method: 'POST',
          body: new URLSearchParams({
            action: 'login_pasien',
            fullname: fullname,
            nik: nik,
            password: password,
          }),
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.success && data.role === 'pasien') {
              localStorage.setItem(
                'pasienSession',
                JSON.stringify({
                  id_pasien: data.id,
                  nama: data.nama,
                  role: data.role,
                  loginTime: new Date().toISOString(),
                })
                
              );
              

              messageAlert.textContent = '✓ Login berhasil! Mengarahkan...';
              messageAlert.className = 'message show success';

              setTimeout(() => {
                window.location.href = 'dashboard_pasien.html';
              }, 1000);
            } else {
              messageAlert.textContent = data.message;
              messageAlert.className = 'message show error';
              loginButton.disabled = false;
            }
          })
          .catch(() => {
            messageAlert.textContent = 'Gagal terhubung ke server';
            messageAlert.className = 'message show error';
            loginButton.disabled = false;
          });
      }
    </script>
    <script>
      const defaultConfig = {
        page_title: 'Login Pasien',
        page_subtitle: 'Masukkan data diri Anda untuk melanjutkan',
        fullname_label: 'Nama Lengkap',
        identity_label: 'Nomor Identitas',
        password_label: 'Password',
        login_button_text: 'Masuk',
        back_link_text: 'Kembali ke Halaman Utama',
        footer_text:
          '© 2024 Sistem Pemeriksaan Kesehatan Pranikah. Hak Cipta Dilindungi.',
        primary_color: '#4A9D8E',
        secondary_color: '#7B8CDE',
        background_color: '#FDF6EC',
        text_color: '#2D3748',
        accent_color: '#CFE8E5',
      };

      let currentConfig = { ...defaultConfig };

      // Go back to home
      function goBackHome(e) {
        e.preventDefault();
        // In a real app, this would navigate to home page
        alert('Kembali ke halaman utama...');
      }

      // Element SDK Integration
      async function onConfigChange(config) {
        currentConfig = { ...config };

        const pageTitle = document.getElementById('pageTitle');
        const pageSubtitle = document.getElementById('pageSubtitle');
        const fullnameLabel = document.getElementById('fullnameLabel');
        const identityLabel = document.getElementById('identityLabel');
        const passwordLabel = document.getElementById('passwordLabel');
        const loginButtonText = document.getElementById('loginButtonText');
        const backLinkText = document.getElementById('backLinkText');
        const footerText = document.getElementById('footerText');

        if (pageTitle)
          pageTitle.textContent = config.page_title || defaultConfig.page_title;
        if (pageSubtitle)
          pageSubtitle.textContent =
            config.page_subtitle || defaultConfig.page_subtitle;
        if (fullnameLabel)
          fullnameLabel.textContent =
            config.fullname_label || defaultConfig.fullname_label;
        if (identityLabel)
          identityLabel.textContent =
            config.identity_label || defaultConfig.identity_label;
        if (passwordLabel)
          passwordLabel.textContent =
            config.password_label || defaultConfig.password_label;
        if (loginButtonText)
          loginButtonText.textContent =
            config.login_button_text || defaultConfig.login_button_text;
        if (backLinkText)
          backLinkText.textContent =
            config.back_link_text || defaultConfig.back_link_text;
        if (footerText)
          footerText.textContent =
            config.footer_text || defaultConfig.footer_text;

        // Apply colors
        const primaryColor =
          config.primary_color || defaultConfig.primary_color;
        const textColor = config.text_color || defaultConfig.text_color;

        document.documentElement.style.setProperty(
          '--primary-color',
          primaryColor
        );
        document.documentElement.style.setProperty('--text-dark', textColor);
      }

      function mapToCapabilities(config) {
        return {
          recolorables: [
            {
              get: () =>
                config.background_color || defaultConfig.background_color,
              set: (value) => {
                currentConfig.background_color = value;
                window.elementSdk.setConfig({ background_color: value });
              },
            },
            {
              get: () => config.accent_color || defaultConfig.accent_color,
              set: (value) => {
                currentConfig.accent_color = value;
                window.elementSdk.setConfig({ accent_color: value });
              },
            },
            {
              get: () => config.text_color || defaultConfig.text_color,
              set: (value) => {
                currentConfig.text_color = value;
                window.elementSdk.setConfig({ text_color: value });
              },
            },
            {
              get: () => config.primary_color || defaultConfig.primary_color,
              set: (value) => {
                currentConfig.primary_color = value;
                window.elementSdk.setConfig({ primary_color: value });
              },
            },
            {
              get: () =>
                config.secondary_color || defaultConfig.secondary_color,
              set: (value) => {
                currentConfig.secondary_color = value;
                window.elementSdk.setConfig({ secondary_color: value });
              },
            },
          ],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined,
        };
      }

      function mapToEditPanelValues(config) {
        return new Map([
          ['page_title', config.page_title || defaultConfig.page_title],
          [
            'page_subtitle',
            config.page_subtitle || defaultConfig.page_subtitle,
          ],
          [
            'fullname_label',
            config.fullname_label || defaultConfig.fullname_label,
          ],
          [
            'identity_label',
            config.identity_label || defaultConfig.identity_label,
          ],
          [
            'password_label',
            config.password_label || defaultConfig.password_label,
          ],
          [
            'login_button_text',
            config.login_button_text || defaultConfig.login_button_text,
          ],
          [
            'back_link_text',
            config.back_link_text || defaultConfig.back_link_text,
          ],
          ['footer_text', config.footer_text || defaultConfig.footer_text],
        ]);
      }

      if (window.elementSdk) {
        window.elementSdk.init({
          defaultConfig,
          onConfigChange,
          mapToCapabilities,
          mapToEditPanelValues,
        });
      }
    </script>
