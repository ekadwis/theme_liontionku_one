<!DOCTYPE html>
<html lang="id" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pemeriksaan Fisik Pasien</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <script src="/_sdk/element_sdk.js"></script>
    <link rel="stylesheet" href="css/pemeriksaan_fisik_pasien.css" />
    <script
      src="https://cdn.tailwindcss.com/3.4.17"
      type="text/javascript"
    ></script>
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
    <style>
      body {
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div class="main-wrapper">
      <!-- Header -->
      <div class="header-section">
        <button class="btn-back" id="backBtn" onclick="handleBack()">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewbox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15 19l-7-7 7-7"
            />
          </svg>
        </button>
        <div class="header-content">
          <h1 id="pageTitle">Pemeriksaan Fisik Pasien</h1>
          <div class="breadcrumb-custom">
            Dashboard Bidan / Pemeriksaan Fisik
          </div>
        </div>
      </div>
      <!-- Main Card -->
      <div class="list-card">
        <!-- Search & Filter -->
        <div class="search-filter-section">
          <div class="search-wrapper">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewbox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
              /></svg
            ><input
              type="text"
              id="searchInput"
              placeholder="Cari nama pasien"
              onkeyup="filterTable()"
            />
          </div>
          <div class="filter-wrapper">
            <label class="filter-label" id="filterLabel">Filter Status:</label>
            <select
              class="filter-dropdown"
              id="filterStatus"
              onchange="filterTable()"
            >
              <option value="">Semua</option>
              <option value="pending">Belum Periksa</option>
              <option value="completed">Sudah Periksa</option>
            </select>
          </div>
        </div>
        <!-- Table -->
        <div class="table-wrapper">
          <table class="table-custom">
            <thead>
              <tr>
                <th class="col-no">No</th>
                <th class="col-name">Nama Pasien</th>
                <th class="col-gender">Jenis Kelamin</th>
                <th class="col-age">Usia</th>
                <th class="col-date">Tanggal Pemeriksaan</th>
                <th>Status</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <!-- Table rows will be populated by JavaScript -->
            </tbody>
          </table>
        </div>
        <!-- Pagination -->
        <div class="pagination-section">
          <button class="pagination-btn" id="prevBtn" onclick="previousPage()">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewbox="0 0 24 24"
              stroke="currentColor"
              style="width: 14px; height: 14px"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15 19l-7-7 7-7"
              />
            </svg>
          </button>
          <div id="pageNumbers"></div>
          <button class="pagination-btn" id="nextBtn" onclick="nextPage()">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewbox="0 0 24 24"
              stroke="currentColor"
              style="width: 14px; height: 14px"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M9 5l7 7-7 7"
              />
            </svg>
          </button>
        </div>
      </div>
    </div>
    <script>
      // Default configuration
      const defaultConfig = {
        page_title: 'Pemeriksaan Fisik Pasien',
        back_button_text: 'Kembali ke Dashboard',
        search_placeholder: 'Cari nama pasien atau nomor rekam medis...',
        filter_label: 'Filter Status:',
        exam_date_label: 'Tanggal Pemeriksaan',
      };

      let patientData = [];
      let currentPage = 1;
      const itemsPerPage = 5;
      let filteredData = [];

        const API_URL = "https://script.google.com/macros/s/AKfycbyS6y63OBsRpR81JhII3N_GxkkTIpgCcs_sCDHXjnx5onzwNOSyIKNbYFooXnLGkCHB/exec";

        function fetchPemeriksaanFisik() {
        
          fetch(API_URL, {
            method: "POST",
            body: new URLSearchParams({
              action: "get-pemeriksaan-fisik"
            })
          })
          .then(res => res.json())
          .then(data => {
        
            if (!data.success) {
        
              document.getElementById("tableBody").innerHTML = `
                <tr>
                  <td colspan="7" style="text-align:center; padding:20px;">
                    Data belum tersedia
                  </td>
                </tr>
              `;
              return;
            }
        
            // Mapping data dari backend
            patientData = data.result.map((item, index) => ({
              id: item.id_pasien,
              name: item.nama_pasien,
              gender: item.jenis_kelamin,
              age: item.usia,
              examDate: item.tanggal_pemeriksaan || "-",
              status: item.status_pemeriksaan === "Sudah Diperiksa"
                ? "completed"
                : "pending"
            }));
        
            filteredData = [...patientData];
        
            renderTable();
            renderPagination();
        
          })
          .catch(err => {
            alert("Gagal terhubung ke server");
            console.error(err);
          });
        }

      // Initialize Element SDK
      if (window.elementSdk) {
        window.elementSdk.init({
          defaultConfig,
          onConfigChange: async (config) => {
            document.getElementById('pageTitle').textContent =
              config.page_title || defaultConfig.page_title;
            document.getElementById('filterLabel').textContent =
              config.filter_label || defaultConfig.filter_label;
            document.getElementById('searchInput').placeholder =
              config.search_placeholder || defaultConfig.search_placeholder;
          },
          mapToCapabilities: (config) => ({
            recolorables: [],
            borderables: [],
            fontEditable: undefined,
            fontSizeable: undefined,
          }),
          mapToEditPanelValues: (config) =>
            new Map([
              ['page_title', config.page_title || defaultConfig.page_title],
              [
                'back_button_text',
                config.back_button_text || defaultConfig.back_button_text,
              ],
              [
                'search_placeholder',
                config.search_placeholder || defaultConfig.search_placeholder,
              ],
              [
                'filter_label',
                config.filter_label || defaultConfig.filter_label,
              ],
              [
                'exam_date_label',
                config.exam_date_label || defaultConfig.exam_date_label,
              ],
            ]),
        });
      }

      // Filter table based on search and status
      function filterTable() {
        const searchValue = document
          .getElementById('searchInput')
          .value.toLowerCase();
        const filterValue = document.getElementById('filterStatus').value;

        filteredData = patientData.filter((patient) => {
          const matchSearch = patient.name.toLowerCase().includes(searchValue);
          const matchFilter =
            filterValue === '' || patient.status === filterValue;
          return matchSearch && matchFilter;
        });

        currentPage = 1;
        renderTable();
        renderPagination();
      }

      // Render table rows
      function renderTable() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';

        const startIndex = (currentPage - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const pageData = filteredData.slice(startIndex, endIndex);

        pageData.forEach((patient, index) => {
          const rowNumber = startIndex + index + 1;
          const statusClass =
            patient.status === 'pending' ? 'pending' : 'completed';
          const statusText =
            patient.status === 'pending'
              ? 'Belum Diperiksa'
              : 'Sudah Diperiksa';
          const actionBtn =
            patient.status === 'pending'
              ? `<button class="btn-action-small primary" onclick="handleExam(${patient.id})">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewbox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
              Isi Pemeriksaan
            </button>`
              : `<button class="btn-action-small secondary" onclick="handleViewExam(${patient.id})">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewbox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
              Lihat Detail
            </button>`;

          const row = document.createElement('tr');
          row.innerHTML = `
          <td class="col-no">${rowNumber}</td>
          <td class="col-name">${patient.name}</td>
          <td class="col-gender">${patient.gender}</td>
          <td class="col-age" style="text-align: center;">${
            patient.age
          } tahun</td>
          <td class="col-date">${patient.examDate}</td>
          <td>
            <div class="status-badge ${statusClass}">
              ${
                patient.status === 'pending'
                  ? '<svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewbox="0 0 24 24"><circle cx="12" cy="12" r="2" /></svg>'
                  : '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewbox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>'
              }
              ${statusText}
            </div>
          </td>
          <td>${actionBtn}</td>
        `;
          tableBody.appendChild(row);
        });
      }

      // Render pagination
      function renderPagination() {
        const pageNumbers = document.getElementById('pageNumbers');
        pageNumbers.innerHTML = '';

        const totalPages = Math.ceil(filteredData.length / itemsPerPage);

        for (let i = 1; i <= totalPages; i++) {
          const btn = document.createElement('button');
          btn.className = `pagination-btn ${i === currentPage ? 'active' : ''}`;
          btn.textContent = i;
          btn.onclick = () => {
            currentPage = i;
            renderTable();
          };
          pageNumbers.appendChild(btn);
        }

        document.getElementById('prevBtn').disabled = currentPage === 1;
        document.getElementById('nextBtn').disabled =
          currentPage === totalPages;
      }

      // Pagination controls
      function previousPage() {
        const totalPages = Math.ceil(filteredData.length / itemsPerPage);
        if (currentPage > 1) {
          currentPage--;
          renderTable();
          renderPagination();
        }
      }

      function nextPage() {
        const totalPages = Math.ceil(filteredData.length / itemsPerPage);
        if (currentPage < totalPages) {
          currentPage++;
          renderTable();
          renderPagination();
        }
      }

      // Action handlers
      function handleExam(patientId) {
        window.location.href = 
          `detail_pemeriksaan_fisik.html?id_pasien=${patientId}`;
      }
      
      function handleViewExam(patientId) {
        window.location.href = 
          `detail_pemeriksaan_fisik.html?id_pasien=${patientId}`;
      }

      function handleDetail(patientId) {
        const patient = patientData.find((p) => p.id === patientId);
        alert(
          `Profil Pasien: ${patient.name}\nNo. Rekam Medis: ${patient.mrn}\nUsia: ${patient.age} tahun`
        );
      }

      function handleBack() {
        alert('Kembali ke Dashboard Bidan');
        window.location.href = 'dashboard_bidan.html';
      }

      // Initialize page
      document.addEventListener('DOMContentLoaded', () => {
        fetchPemeriksaanFisik();
      });
    </script>

      })();
    </script>
  </body>
</html>
