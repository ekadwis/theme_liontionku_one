<!DOCTYPE html>
<html lang="id" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Pasien</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="css/pemeriksaan_fisik_pasien.css" />
  </head>

  <body>
    <div class="main-wrapper">
      <!-- Header -->
      <div class="header-section">
        <button class="btn-back" onclick="handleBack()">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15 19l-7-7 7-7" />
          </svg>
        </button>
        <div class="header-content">
          <h1>Data Pasien</h1>
          <div class="breadcrumb-custom">Dashboard Bidan / Data Pasien</div>
        </div>
      </div>

      <!-- Main Card -->
      <div class="list-card">

        <!-- Top Section -->
        <div class="search-filter-section"
             style="justify-content: space-between;">

          <div class="search-wrapper">
            <input
              type="text"
              id="searchInput"
              placeholder="Cari nama pasien"
              onkeyup="filterTable()"
            />
          </div>

          <button class="btn-action-small primary"
                  data-bs-toggle="modal"
                  data-bs-target="#modalTambah">
            + Tambah Pasien
          </button>
        </div>

        <!-- Table -->
        <div class="table-wrapper">
          <table class="table-custom">
            <thead>
              <tr>
                <th>No</th>
                <th>Nama Lengkap</th>
                <th>Username</th>
                <th>NIK</th>
                <th>Jenis Kelamin</th>
                <th>Tanggal Lahir</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>

      </div>
    </div>

    <!-- Modal Tambah Pasien -->
    <div class="modal fade" id="modalTambah" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">

          <div class="modal-header">
            <h5 class="modal-title">Tambah Pasien</h5>
            <button type="button" class="btn-close"
              data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">

            <div class="mb-3">
              <label>Nama Lengkap</label>
              <input type="text" id="nama"
                class="form-control" />
            </div>

            <div class="mb-3">
              <label>Username</label>
              <input type="text" id="username"
                class="form-control" />
            </div>

            <div class="mb-3">
              <label>Password</label>
              <input type="password" id="password"
                class="form-control" />
            </div>

            <div class="mb-3">
              <label>NIK</label>
              <input type="text" id="nik"
                class="form-control" />
            </div>

            <div class="mb-3">
              <label>Jenis Kelamin</label>
              <select id="jenisKelamin"
                class="form-control">
                <option value="perempuan">Perempuan</option>
                <option value="laki-laki">Laki-laki</option>
              </select>
            </div>

            <div class="mb-3">
              <label>Tanggal Lahir</label>
              <input type="date" id="tanggalLahir"
                class="form-control" />
            </div>

          </div>

          <div class="modal-footer">
            <button class="btn btn-secondary"
              data-bs-dismiss="modal">
              Batal
            </button>
            <button class="btn btn-primary"
              onclick="tambahPasien()">
              Simpan
            </button>
          </div>

        </div>
      </div>
    </div>

    <script>
        const API_URL =
          "https://script.google.com/macros/s/AKfycbyS6y63OBsRpR81JhII3N_GxkkTIpgCcs_sCDHXjnx5onzwNOSyIKNbYFooXnLGkCHB/exec";
      
        let patientData = [];
        let filteredData = [];
      
        function renderTable() {
          const tableBody = document.getElementById("tableBody");
          tableBody.innerHTML = "";
      
          if (filteredData.length === 0) {
            tableBody.innerHTML = `
              <tr>
                <td colspan="7" style="text-align:center; padding:20px;">
                  Data belum tersedia
                </td>
              </tr>
            `;
            return;
          }
      
          filteredData.forEach((patient, index) => {
            const row = document.createElement("tr");
      
            row.innerHTML = `
              <td>${index + 1}</td>
              <td>${patient.nama_lengkap}</td>
              <td>${patient.username}</td>
              <td>${patient.nik}</td>
              <td>${patient.jenis_kelamin}</td>
              <td>${patient.tanggal_lahir}</td>
              <td>
                <button class="btn-action-small danger"
                  onclick="hapusPasien('${patient.id}')">
                  Hapus
                </button>
              </td>
            `;
      
            tableBody.appendChild(row);
          });
        }
      
        function filterTable() {
          const searchValue = document
            .getElementById("searchInput")
            .value.toLowerCase();
      
          filteredData = patientData.filter(p =>
            p.nama_lengkap.toLowerCase().includes(searchValue)
          );
      
          renderTable();
        }
      
        function loadData() {
          fetch(API_URL, {
            method: "POST",
            body: new URLSearchParams({
              action: "get-data-pasien"
            })
          })
          .then(res => res.json())
          .then(data => {
      
            if (!data.success) {
              document.getElementById("tableBody").innerHTML = `
                <tr>
                  <td colspan="7" style="text-align:center; padding:20px;">
                    Data belum tersedia
                  </td>
                </tr>
              `;
              return;
            }
      
            // 🔥 Mapping sesuai backend kamu
            patientData = data.result
              .filter(item => item.role === "pasien") // hanya tampilkan role pasien
              .map(item => ({
                id: item.id,
                nama_lengkap: item.nama_lengkap,
                username: item.username,
                nik: item.nik,
                jenis_kelamin: item.jenis_kelamin,
                tanggal_lahir: item.tanggal_lahir
              }));
      
            filteredData = [...patientData];
      
            renderTable();
          })
          .catch(err => {
            alert("Gagal terhubung ke server");
            console.error(err);
          });
        }
      
        function hapusPasien(id) {
          if (!confirm("Yakin ingin menghapus pasien ini?")) return;
      
          fetch(API_URL, {
            method: "POST",
            body: new URLSearchParams({
              action: "hapus-data-pasien",
              id: id
            })
          })
          .then(res => res.json())
          .then(data => {
            if (!data.success) {
              alert(data.message);
              return;
            }
      
            alert("Data berhasil dihapus");
            loadData();
          })
          .catch(err => {
            alert("Gagal menghapus data");
            console.error(err);
          });
        }
      
        function tambahPasien() {
      
          const nama = document.getElementById("nama").value;
          const username = document.getElementById("username").value;
          const password = document.getElementById("password").value;
          const nik = document.getElementById("nik").value;
          const jenisKelamin = document.getElementById("jenisKelamin").value;
          const tanggalLahir = document.getElementById("tanggalLahir").value;
      
          if (!nama || !username || !password || !nik || !jenisKelamin || !tanggalLahir) {
            alert("Semua field wajib diisi");
            return;
          }
      
          fetch(API_URL, {
            method: "POST",
            body: new URLSearchParams({
              action: "tambah-data-pasien",
              nama_lengkap: nama,
              username: username,
              password: password,
              nik: nik,
              role: "pasien",
              status: "aktif",
              jenis_kelamin: jenisKelamin,
              tanggal_lahir: tanggalLahir
            })
          })
          .then(res => res.json())
          .then(data => {
            if (!data.success) {
              alert(data.message);
              return;
            }
      
            alert("Pasien berhasil ditambahkan");
      
            const modal = bootstrap.Modal.getInstance(
              document.getElementById("modalTambah")
            );
            modal.hide();
      
            document.querySelectorAll("#modalTambah input").forEach(i => i.value = "");
            document.getElementById("jenisKelamin").value = "";
      
            loadData();
          })
          .catch(err => {
            alert("Gagal menambahkan data");
            console.error(err);
          });
        }
      
        function handleBack() {
          window.location.href = "dashboard_bidan.html";
        }
      
        document.addEventListener("DOMContentLoaded", loadData);
      </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
