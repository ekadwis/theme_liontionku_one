<!DOCTYPE html>
<html lang="id" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SRQ Results - Midwife</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <script src="/_sdk/element_sdk.js"></script>
    <link rel="stylesheet" href="css/hasil_srq_test.css" />
    <script
      src="https://cdn.tailwindcss.com/3.4.17"
      type="text/javascript"
    ></script>
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
    <style>
      body {
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <div class="content-wrapper">
        <!-- Header with Back Button -->
        <div class="header-bar">
          <button class="btn-back" id="backBtn" onclick="handleBack()">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewbox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15 19l-7-7 7-7"
              />
            </svg>
          </button>
          <div class="header-title">
            <h1 id="pageTitle">Hasil Skrining SRQ Pasien</h1>
            <p>Data lengkap hasil tes SRQ semua pasien</p>
          </div>
        </div>
        <!-- Search Box -->
        <div
          class="patient-card"
          style="margin-bottom: 1.5rem; padding: 1.5rem"
        >
          <input
            type="text"
            id="searchInput"
            class="form-control"
            placeholder="Cari nama pasien..."
            style="
              border-radius: 12px;
              border: 2px solid rgba(207, 232, 229, 0.3);
              padding: 0.75rem 1rem;
              font-size: 0.95rem;
            "
          />
        </div>
        <!-- Statistics Cards -->
        <div
          style="
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
          "
        >
          <div
            class="patient-card"
            style="padding: 1.5rem; text-align: center; margin-bottom: 0"
          >
            <p
              style="
                color: var(--text-secondary);
                margin: 0 0 0.5rem 0;
                font-size: 0.9rem;
              "
            >
              Total Pasien
            </p>
            <h3
              style="
                color: var(--text-primary);
                font-size: 2rem;
                font-weight: 700;
                margin: 0;
              "
              id="totalPatients"
            >
              0
            </h3>
          </div>
        </div>
        <!-- Table Card -->
        <div
          class="patient-card"
          style="padding: 0; overflow: hidden; margin-bottom: 2rem"
        >
          <div style="overflow-x: auto">
            <table style="width: 100%; border-collapse: collapse">
              <thead>
                <tr
                  style="
                    background: rgba(207, 232, 229, 0.15);
                    border-bottom: 2px solid rgba(207, 232, 229, 0.3);
                  "
                >
                  <th
                    style="
                      padding: 1rem;
                      text-align: left;
                      font-weight: 600;
                      color: var(--text-primary);
                      font-size: 0.9rem;
                    "
                  >
                    Nama Pasien
                  </th>
                  <th
                    style="
                      padding: 1rem;
                      text-align: center;
                      font-weight: 600;
                      color: var(--text-primary);
                      font-size: 0.9rem;
                    "
                  >
                    Skor SRQ
                  </th>
                  <th
                    style="
                      padding: 1rem;
                      text-align: center;
                      font-weight: 600;
                      color: var(--text-primary);
                      font-size: 0.9rem;
                    "
                  >
                    Tanggal Tes
                  </th>
                  <th
                    style="
                      padding: 1rem;
                      text-align: center;
                      font-weight: 600;
                      color: var(--text-primary);
                      font-size: 0.9rem;
                    "
                  >
                    Aksi
                  </th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <!-- Table rows will be inserted here -->
              </tbody>
            </table>
          </div>
          <div
            id="emptyState"
            style="padding: 3rem 2rem; text-align: center; display: none"
          >
            <p
              style="
                color: var(--text-secondary);
                margin: 0;
                font-size: 0.95rem;
              "
            >
              Tidak ada data pasien yang ditemukan
            </p>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const API_URL =
        'https://script.google.com/macros/s/AKfycbyS6y63OBsRpR81JhII3N_GxkkTIpgCcs_sCDHXjnx5onzwNOSyIKNbYFooXnLGkCHB/exec';

      let patientData = [];
      let filteredData = [];
      // Default configuration
      const defaultConfig = {
        page_title: 'Hasil Skrining SRQ Pasien',
        back_button_text: 'Kembali ke Dashboard',
        search_placeholder: 'Cari nama pasien...',
        detail_button_text: 'Lihat Detail',
      };

      // Format date
      function formatDate(dateString) {
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        return new Date(dateString).toLocaleDateString('id-ID', options);
      }
      function loadData() {
        fetch(API_URL, {
          method: 'POST',
          body: new URLSearchParams({
            action: 'get-hasil-srq',
          }),
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.success) {
              patientData = data.result.map((item, index) => ({
                id: item.id_pasien,
                name: item.nama_pasien,
                score: Number(item.skor),
                testDate: item.tanggal_submit,
              }));

              filteredData = [...patientData];

              renderTable();
            } else {
              patientData = [];
              filteredData = [];
              renderTable();
            }
          })
          .catch((err) => {
            console.error('Gagal ambil data:', err);
          });
      }

      // Render table
      function renderTable() {
        const tableBody = document.getElementById('tableBody');
        const emptyState = document.getElementById('emptyState');

        if (filteredData.length === 0) {
          tableBody.innerHTML = '';
          emptyState.style.display = 'block';
        } else {
          emptyState.style.display = 'none';
          tableBody.innerHTML = filteredData
  .map((patient) => {
    return `
      <tr style="border-bottom: 1px solid rgba(207, 232, 229, 0.2); transition: background 0.2s ease;" 
          onmouseover="this.style.background='rgba(207, 232, 229, 0.08)'" 
          onmouseout="this.style.background='transparent'">

        <td style="padding: 1rem; color: var(--text-primary); font-weight: 500;">
          ${patient.name}
        </td>

        <td style="padding: 1rem; text-align: center; color: var(--text-primary); font-weight: 600; font-size: 1.1rem;">
          ${patient.score}
        </td>

        <td style="padding: 1rem; text-align: center; color: var(--text-secondary);">
          ${formatDate(patient.testDate)}
        </td>

        <td style="padding: 1rem; text-align: center;">
          <button onclick="handleDetail('${patient.id}')"
            style="padding: 0.5rem 1.5rem; background: linear-gradient(135deg, var(--soft-sage), #B8D8D4); 
            color: var(--text-primary); border: none; border-radius: 10px; font-weight: 600; 
            font-size: 0.85rem; cursor: pointer; transition: all 0.3s ease;">
            ${defaultConfig.detail_button_text}
          </button>
        </td>

      </tr>
    `;
  })
  .join('');
        }
        updateStatistics();
      }

      // Update statistics
      function updateStatistics() {
        const total = filteredData.length;
        document.getElementById('totalPatients').textContent = total;
      }

      // Search functionality
      document
        .getElementById('searchInput')
        .addEventListener('keyup', function (e) {
          const searchTerm = e.target.value.toLowerCase();
          filteredData = patientData.filter((patient) =>
            patient.name.toLowerCase().includes(searchTerm)
          );
          renderTable();
        });

      // Handle detail button
      function handleDetail(patientId) {
  window.location.href = `hasil_srq.html?id_pasien=${patientId}`;
}

      // Handle back button
      function handleBack() {
        alert('Kembali ke Dashboard Bidan...');
        setTimeout(() => {
          window.location.href = 'dashboard_bidan.html';
        }, 500);
      }

      // Initialize Element SDK
      if (window.elementSdk) {
        window.elementSdk.init({
          defaultConfig,
          onConfigChange: async (config) => {
            // Update page title
            document.getElementById('pageTitle').textContent =
              config.page_title || defaultConfig.page_title;

            // Update search placeholder
            document.getElementById('searchInput').placeholder =
              config.search_placeholder || defaultConfig.search_placeholder;

            // Update button text
            const buttons = document.querySelectorAll('button');
            buttons.forEach((btn) => {
              if (
                btn.textContent.includes('Lihat Detail') ||
                btn.textContent.includes(defaultConfig.detail_button_text)
              ) {
                btn.textContent =
                  config.detail_button_text || defaultConfig.detail_button_text;
              }
            });
          },
          mapToCapabilities: (config) => ({
            recolorables: [],
            borderables: [],
            fontEditable: undefined,
            fontSizeable: undefined,
          }),
          mapToEditPanelValues: (config) =>
            new Map([
              ['page_title', config.page_title || defaultConfig.page_title],
              [
                'back_button_text',
                config.back_button_text || defaultConfig.back_button_text,
              ],
              [
                'search_placeholder',
                config.search_placeholder || defaultConfig.search_placeholder,
              ],
              [
                'detail_button_text',
                config.detail_button_text || defaultConfig.detail_button_text,
              ],
            ]),
        });
      }

      // Initialize page
      document.addEventListener('DOMContentLoaded', loadData);
    </script>

            b.getElementsByTagName('head')[0].appendChild(d);

      })();
    </script>
  </body>
</html>
