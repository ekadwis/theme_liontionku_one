<!DOCTYPE html>
<html lang="id" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hasil Lab Pasien</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="css/pemeriksaan_fisik_pasien.css" />

    <style>
      .upload-hidden {
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="main-wrapper">
      <!-- Header -->
      <div class="header-section">
        <button class="btn-back" onclick="handleBack()">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15 19l-7-7 7-7"
            />
          </svg>
        </button>
        <div class="header-content">
          <h1>Hasil Lab Pasien</h1>
          <div class="breadcrumb-custom">Dashboard Bidan / Hasil Lab</div>
        </div>
      </div>

      <!-- Main Card -->
      <div class="list-card">
        <!-- Search & Filter -->
        <div class="search-filter-section">
          <div class="search-wrapper">
            <input
              type="text"
              id="searchInput"
              placeholder="Cari nama pasien"
              onkeyup="filterTable()"
            />
          </div>

          <div class="filter-wrapper">
            <label class="filter-label">Filter Status:</label>
            <select
              class="filter-dropdown"
              id="filterStatus"
              onchange="filterTable()"
            >
              <option value="">Semua</option>
              <option value="pending">Belum Upload</option>
              <option value="completed">Sudah Upload</option>
            </select>
          </div>
        </div>

        <!-- Table -->
        <div class="table-wrapper">
          <table class="table-custom">
            <thead>
              <tr>
                <th class="col-no">No</th>
                <th>Nama Pasien</th>
                <th>Jenis Kelamin</th>
                <th>Usia</th>
                <th>Status</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      let patientData = [];
      let filteredData = [];

      function renderTable() {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';

        filteredData.forEach((patient, index) => {
          const statusClass =
            patient.status === 'completed' ? 'completed' : 'pending';
          const statusText =
            patient.status === 'completed' ? 'Sudah Upload' : 'Belum Upload';

          const actionBtn =
            patient.status === 'pending'
              ? `
          <button class="btn-action-small primary" onclick="triggerUpload(${patient.id})">
            Upload File
          </button>
          <input type="file" accept="application/pdf"
            id="upload-${patient.id}"
            class="upload-hidden"
            onchange="handleUpload(event, ${patient.id})"
          />
        `
              : `
          <a href="${patient.file}" target="_blank"
            class="btn-action-small secondary">
            Lihat File
          </a>
        `;

          const row = document.createElement('tr');
          row.innerHTML = `
        <td>${index + 1}</td>
        <td>${patient.name}</td>
        <td>${patient.gender}</td>
        <td>${patient.age} tahun</td>
        <td>
          <div class="status-badge ${statusClass}">
            ${statusText}
          </div>
        </td>
        <td>${actionBtn}</td>
      `;

          tableBody.appendChild(row);
        });
      }

      function filterTable() {
        const searchValue = document
          .getElementById('searchInput')
          .value.toLowerCase();
        const filterValue = document.getElementById('filterStatus').value;

        filteredData = patientData.filter((patient) => {
          const matchSearch = patient.name.toLowerCase().includes(searchValue);
          const matchFilter =
            filterValue === '' || patient.status === filterValue;
          return matchSearch && matchFilter;
        });

        renderTable();
      }

      function triggerUpload(id) {
        document.getElementById('upload-' + id).click();
      }

      const API_URL =
        'https://script.google.com/macros/s/AKfycbyS6y63OBsRpR81JhII3N_GxkkTIpgCcs_sCDHXjnx5onzwNOSyIKNbYFooXnLGkCHB/exec';

        function loadData() {

fetch(API_URL, {
  method: "POST",
  body: new URLSearchParams({
    action: "get-hasil-lab"
  })
})
.then(res => res.json())
.then(data => {

  if (!data.success) {
    document.getElementById("tableBody").innerHTML = `
      <tr>
        <td colspan="6" style="text-align:center; padding:20px;">
          Data belum tersedia
        </td>
      </tr>
    `;
    return;
  }

  patientData = data.result.map(item => ({
    id: item.id_pasien,
    name: item.nama_pasien,
    gender: item.jenis_kelamin,
    age: item.usia,
    status: item.status,
    file: item.link_file
  }));

  filteredData = [...patientData];

  renderTable();

})
.catch(err => {
  alert("Gagal terhubung ke server");
  console.error(err);
});
}

      function handleUpload(event, id) {
        const file = event.target.files[0];
        if (!file) return;

        if (file.type !== 'application/pdf') {
          alert('Hanya file PDF yang diperbolehkan');
          return;
        }

        const reader = new FileReader();

        reader.onload = function () {
          fetch(API_URL, {
            method: 'POST',
            body: new URLSearchParams({
              action: 'upload-hasil-lab',
              id_pasien: id,
              file: reader.result,
              file_name: file.name,
            }),
          })
            .then((res) => res.json())
            .then((data) => {
              if (!data.success) {
                alert(data.message);
                return;
              }

              alert('Upload berhasil!');

              const patient = patientData.find((p) => p.id === id);
              patient.status = 'completed';
              patient.file = data.link;

              filteredData = [...patientData];
              renderTable();
            })
            .catch((err) => {
              alert('Gagal upload ke server');
              console.error(err);
            });
        };

        reader.readAsDataURL(file);
      }

      function handleBack() {
        window.location.href = 'dashboard_bidan.html';
      }

      document.addEventListener('DOMContentLoaded', loadData);
    </script>
  </body>
</html>
